<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect x="1" y="1" width="598" height="468" rx="14" fill="#0a1626" stroke="#00d4ff" stroke-opacity="0.25"/>
  <text x="24" y="34" fill="#00d4ff" font-size="16" font-weight="700" letter-spacing="0.5">DISTANCE FROM PEOPLE · 与人的距离 (top view 俯视)</text>
  <line x1="24" y1="44" x2="576" y2="44" stroke="#00d4ff" stroke-opacity="0.18"/>

  <!-- zones -->
  <circle cx="200" cy="258" r="170" fill="#00ff88" fill-opacity="0.05" stroke="#00ff88" stroke-opacity="0.55"/>
  <circle cx="200" cy="258" r="110" fill="#ffaa00" fill-opacity="0.06" stroke="#ffaa00" stroke-opacity="0.6"/>
  <circle cx="200" cy="258" r="46" fill="#ff3860" fill-opacity="0.10" stroke="#ff3860" stroke-opacity="0.7"/>

  <!-- ring labels -->
  <text x="200" y="108" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="700">&gt; 30 m</text>
  <text x="200" y="170" text-anchor="middle" fill="#ffaa00" font-size="13" font-weight="700">5–30 m</text>
  <text x="200" y="318" text-anchor="middle" fill="#ff6b87" font-size="11.5" font-weight="700">&lt; 5 m</text>

  <!-- drone at centre -->
  <g transform="translate(200,258)" stroke="#00d4ff" stroke-width="2">
    <line x1="-16" y1="-7" x2="16" y2="7"/><line x1="-16" y1="7" x2="16" y2="-7"/>
    <circle cx="-16" cy="-7" r="4" fill="none"/><circle cx="16" cy="-7" r="4" fill="none"/>
    <circle cx="-16" cy="7" r="4" fill="none"/><circle cx="16" cy="7" r="4" fill="none"/>
    <rect x="-6" y="-5" width="12" height="10" rx="2" fill="#00d4ff" stroke="none"/>
  </g>

  <!-- bystander on outer ring -->
  <g transform="translate(200,428)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#cfe9f5" stroke-width="2"/>
    <line x1="0" y1="7" x2="0" y2="26" stroke="#cfe9f5" stroke-width="2"/>
    <line x1="-9" y1="15" x2="9" y2="15" stroke="#cfe9f5" stroke-width="2"/>
  </g>

  <!-- legend -->
  <g font-size="12.5">
    <rect x="392" y="70" width="184" height="18" rx="3" fill="#00ff88" fill-opacity="0.12"/>
    <rect x="396" y="73" width="12" height="12" rx="2" fill="#00ff88"/>
    <text x="416" y="83" fill="#cfe9f5" font-weight="700">&gt; 30 m</text>
    <text x="396" y="106" fill="#9fb6c9" font-size="11.5">Basic &amp; Advanced OK.</text>

    <rect x="392" y="142" width="184" height="18" rx="3" fill="#ffaa00" fill-opacity="0.14"/>
    <rect x="396" y="145" width="12" height="12" rx="2" fill="#ffaa00"/>
    <text x="416" y="155" fill="#cfe9f5" font-weight="700">5 – 30 m</text>
    <text x="396" y="178" fill="#9fb6c9" font-size="11.5">Advanced + approved RPAS</text>
    <text x="396" y="195" fill="#9fb6c9" font-size="11.5">(operations near people).</text>

    <rect x="392" y="230" width="184" height="18" rx="3" fill="#ff3860" fill-opacity="0.16"/>
    <rect x="396" y="233" width="12" height="12" rx="2" fill="#ff3860"/>
    <text x="416" y="243" fill="#cfe9f5" font-weight="700">&lt; 5 m / overhead</text>
    <text x="396" y="266" fill="#9fb6c9" font-size="11.5">Advanced + approved RPAS</text>
    <text x="396" y="283" fill="#9fb6c9" font-size="11.5">(operations OVER people).</text>
  </g>

  <text x="24" y="450" fill="#9fb6c9" font-size="11.5">Approved = Standard 922 safety-assured RPAS · distances measured horizontally, at any altitude · 经 922 标准安全保证的机型.</text>
</svg>
