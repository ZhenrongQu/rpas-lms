<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrA" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ffaa00"/></marker>
  </defs>
  <rect x="1" y="1" width="758" height="438" rx="14" fill="#0a1626" stroke="#00d4ff" stroke-opacity="0.25"/>
  <text x="24" y="34" fill="#00d4ff" font-size="17" font-weight="700" letter-spacing="1">BASIC OPERATING LIMITS · 基础运行限制</text>
  <line x1="24" y1="44" x2="736" y2="44" stroke="#00d4ff" stroke-opacity="0.18"/>

  <!-- ceiling -->
  <line x1="40" y1="92" x2="720" y2="92" stroke="#ff3860" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="412" y="84" fill="#ff3860" font-size="13" font-weight="700">▲ MAX 400 ft (122 m) AGL</text>

  <!-- ground -->
  <line x1="24" y1="330" x2="736" y2="330" stroke="#2a3b52" stroke-width="2"/>
  <rect x="24" y="330" width="712" height="6" fill="#0e1f33"/>

  <!-- operator -->
  <g transform="translate(95,252)">
    <rect x="-15" y="-28" width="13" height="8" rx="1" fill="#00ff88" opacity="0.85"/>
    <circle cx="0" cy="-46" r="9" fill="none" stroke="#00ff88" stroke-width="2"/>
    <line x1="0" y1="-37" x2="0" y2="-8" stroke="#00ff88" stroke-width="2"/>
    <line x1="-12" y1="-22" x2="12" y2="-22" stroke="#00ff88" stroke-width="2"/>
    <line x1="0" y1="-8" x2="-9" y2="14" stroke="#00ff88" stroke-width="2"/>
    <line x1="0" y1="-8" x2="9" y2="14" stroke="#00ff88" stroke-width="2"/>
    <text x="0" y="34" fill="#cfe9f5" font-size="12" text-anchor="middle">PILOT 操作员</text>
  </g>

  <!-- drone -->
  <g transform="translate(385,156)">
    <line x1="-26" y1="-12" x2="26" y2="12" stroke="#00d4ff" stroke-width="2"/>
    <line x1="-26" y1="12" x2="26" y2="-12" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="-26" cy="-12" r="6" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="26" cy="-12" r="6" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="-26" cy="12" r="6" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="26" cy="12" r="6" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <rect x="-9" y="-7" width="18" height="14" rx="3" fill="#00d4ff"/>
  </g>

  <!-- VLOS line -->
  <line x1="103" y1="208" x2="360" y2="156" stroke="#00ff88" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="150" y="186" fill="#00ff88" font-size="12">VLOS — keep in sight 目视可见</text>

  <!-- bystander -->
  <g transform="translate(650,252)">
    <circle cx="0" cy="-46" r="9" fill="none" stroke="#ffaa00" stroke-width="2"/>
    <line x1="0" y1="-37" x2="0" y2="-8" stroke="#ffaa00" stroke-width="2"/>
    <line x1="-12" y1="-24" x2="12" y2="-24" stroke="#ffaa00" stroke-width="2"/>
    <line x1="0" y1="-8" x2="-9" y2="14" stroke="#ffaa00" stroke-width="2"/>
    <line x1="0" y1="-8" x2="9" y2="14" stroke="#ffaa00" stroke-width="2"/>
    <text x="0" y="34" fill="#cfe9f5" font-size="12" text-anchor="middle">BYSTANDER 旁观者</text>
  </g>

  <!-- 30 m arrow -->
  <line x1="412" y1="300" x2="632" y2="300" stroke="#ffaa00" stroke-width="1.5" marker-start="url(#arrA)" marker-end="url(#arrA)"/>
  <text x="522" y="293" fill="#ffaa00" font-size="13" font-weight="700" text-anchor="middle">≥ 30 m (100 ft)</text>

  <!-- legend -->
  <g font-size="12.5">
    <rect x="24" y="356" width="712" height="62" rx="8" fill="#06101e" stroke="#00d4ff" stroke-opacity="0.15"/>
    <text x="40" y="379" fill="#ff3860" font-weight="700">NO-GO 禁区:</text>
    <text x="150" y="379" fill="#cfe9f5">3 NM from airports · 1 NM from heliports · NOT in controlled airspace · 3 NM from military</text>
    <text x="40" y="403" fill="#00ff88" font-weight="700">REQUIRED:</text>
    <text x="150" y="403" fill="#cfe9f5">VLOS · ≤ 400 ft AGL · ≥ 30 m from people, never overhead · night needs position lights</text>
  </g>
</svg>
