name: remediation
on:
  workflow_run:
    workflows: [test]
    types: [completed]
permissions:
  contents: write
  pull-requests: write
  actions: read
concurrency:
  group: remediation-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false
jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      !startsWith(github.event.workflow_run.head_branch, 'remediation/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_PASSWORD: postgres }
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/postgres
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ github.token }}
      CI_REPORT_FILE: vitest-report.json
      CI_EVENT_KIND: ${{ github.event.workflow_run.event }}
      CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      CI_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      CI_BASE_REF: ${{ github.event.workflow_run.pull_requests[0].base.ref }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
      - name: Download the failing run's report
        uses: actions/download-artifact@v4
        with:
          name: vitest-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - run: pnpm remediation:ci
